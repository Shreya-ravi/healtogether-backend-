<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAL TOGETHER - Profile History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            background-image: radial-gradient(#e2e8f0 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: #1e293b;
        }
        .main-card {
            background: #fff;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 md:px-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">HEAL TOGETHER</h1>
                <p class="text-slate-500 font-medium">Full Profile And Remedy History</p>
            </div>
            <div class="flex gap-3">
                <button id="backBtn" type="button" class="px-5 py-3 bg-slate-100 text-slate-700 font-bold rounded-2xl hover:bg-slate-200">Back</button>
                <button id="logoutBtn" type="button" class="px-5 py-3 bg-red-50 text-red-600 font-bold rounded-2xl hover:bg-red-100">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="main-card rounded-[2rem] p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Account</p>
                <h2 id="profileName" class="text-2xl font-black text-slate-800">Guest</h2>
                <p id="profileReviewCount" class="text-sm text-slate-500 mt-2">0 reviews written</p>
            </div>
            <div class="main-card rounded-[2rem] p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Past Symptoms</p>
                <div id="pastSymptoms" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="main-card rounded-[2rem] p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Previous Remedies</p>
                <div id="previousRemedies" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="main-card rounded-[2rem] p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Symptom Severity History</p>
                <div id="severityHistory" class="space-y-3"></div>
            </div>
            <div class="main-card rounded-[2rem] p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Patient Form History</p>
                <div id="patientHistory" class="space-y-3"></div>
            </div>
        </div>

        <div class="main-card rounded-[2rem] p-6">
            <div class="flex items-center justify-between gap-4 mb-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Reviews Written</p>
                <button id="addReviewBtn" type="button" class="px-4 py-2 bg-slate-900 text-white text-xs font-bold rounded-xl">Add Another Review</button>
            </div>
            <div id="quickReviewForm" class="hidden bg-slate-50 rounded-2xl p-4 mb-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                    <input id="newReviewRemedy" type="text" placeholder="Remedy name" class="px-4 py-3 rounded-xl border border-slate-200 bg-white outline-none text-sm">
                    <input id="newReviewRating" type="number" min="1" max="5" placeholder="Rating 1-5" class="px-4 py-3 rounded-xl border border-slate-200 bg-white outline-none text-sm">
                    <button id="submitQuickReviewBtn" type="button" class="px-4 py-3 bg-blue-600 text-white text-sm font-bold rounded-xl">Post Review</button>
                </div>
                <textarea id="newReviewComment" rows="3" placeholder="Write your review here..." class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white outline-none text-sm resize-none"></textarea>
            </div>
            <div id="reviewsWritten" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";
        let currentAccount = null;
        let availableRemedies = [];

        function getSavedAccount() {
            try {
                return JSON.parse(localStorage.getItem("healthAppAccount")) || null;
            } catch {
                return null;
            }
        }

        function getLocalReviews() {
            try {
                return JSON.parse(localStorage.getItem("healthAppLocalReviews")) || [];
            } catch {
                return [];
            }
        }

        function saveLocalReviews(reviews) {
            localStorage.setItem("healthAppLocalReviews", JSON.stringify(reviews));
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderTags(id, values, emptyText) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            if (!values.length) {
                container.innerHTML = `<p class="text-xs text-slate-400">${escapeHtml(emptyText)}</p>`;
                return;
            }

            values.forEach((value) => {
                const tag = document.createElement("span");
                tag.className = "text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase tracking-wide";
                tag.textContent = value;
                container.appendChild(tag);
            });
        }

        function getReviewIdentityKey(review) {
            return [
                String(review.account_id || "").trim().toLowerCase(),
                String(review.remedy || "").trim().toLowerCase(),
                String(review.user_name || "").trim().toLowerCase(),
                String(review.comment || "").trim().toLowerCase(),
                String(review.created_at || "").trim().toLowerCase()
            ].join("|");
        }

        async function addAnotherReview() {
            const remedy = document.getElementById("newReviewRemedy").value.trim();
            const comment = document.getElementById("newReviewComment").value.trim();
            const rating = Math.max(1, Math.min(5, Number(document.getElementById("newReviewRating").value) || 5));

            if (!currentAccount?.name) {
                window.alert("Please login first.");
                return;
            }

            if (!remedy || !comment) {
                window.alert("Please enter the remedy name and your review.");
                return;
            }

            const response = await fetch(`${API_BASE}/add-review`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    remedy,
                    account_id: currentAccount.account_id || null,
                    user_name: currentAccount.name,
                    comment,
                    rating
                })
            });

            let message = "Review shared for doctor approval.";
            if (!response.ok) {
                const localReviews = getLocalReviews();
                localReviews.unshift({
                    remedy,
                    account_id: currentAccount.account_id || null,
                    user_name: currentAccount.name,
                    comment,
                    rating,
                    created_at: new Date().toISOString()
                });
                saveLocalReviews(localReviews);
                message = "Review saved locally and shown in your history.";
            }

            document.getElementById("newReviewRemedy").value = "";
            document.getElementById("newReviewComment").value = "";
            document.getElementById("newReviewRating").value = "";
            document.getElementById("quickReviewForm").classList.add("hidden");
            window.alert(message);
            await loadHistory();
        }

        async function editReview(review) {
            const updatedComment = window.prompt("Edit your review:", review.comment || "");
            if (updatedComment === null) {
                return;
            }

            const updatedRatingInput = window.prompt("Update rating from 1 to 5:", String(review.rating || 5));
            if (updatedRatingInput === null) {
                return;
            }

            const updatedRating = Math.max(1, Math.min(5, Number(updatedRatingInput) || 5));

            if (!review.review_key) {
                const localReviews = getLocalReviews().map((item) => {
                    if (getReviewIdentityKey(item) === getReviewIdentityKey(review)) {
                        return { ...item, comment: updatedComment.trim(), rating: updatedRating };
                    }

                    return item;
                });

                saveLocalReviews(localReviews);
                await loadHistory();
                return;
            }

            const response = await fetch(`${API_BASE}/update-review`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    review_key: review.review_key,
                    remedy: review.remedy,
                    account_id: currentAccount.account_id || null,
                    user_name: currentAccount.name,
                    original_comment: review.comment,
                    comment: updatedComment.trim(),
                    rating: updatedRating
                })
            });

            const result = await response.json();
            if (!response.ok) {
                window.alert(result.message || "Unable to update this review.");
                return;
            }

            await loadHistory();
        }

        async function deleteReview(review) {
            if (!window.confirm("Delete this review?")) {
                return;
            }

            if (!review.review_key) {
                const localReviews = getLocalReviews().filter((item) => getReviewIdentityKey(item) !== getReviewIdentityKey(review));
                saveLocalReviews(localReviews);
                await loadHistory();
                return;
            }

            const response = await fetch(`${API_BASE}/delete-review`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    review_key: review.review_key,
                    remedy: review.remedy,
                    account_id: currentAccount.account_id || null,
                    user_name: currentAccount.name,
                    original_comment: review.comment
                })
            });

            const result = await response.json();
            if (!response.ok) {
                window.alert(result.message || "Unable to delete this review.");
                return;
            }

            await loadHistory();
        }

        async function loadHistory() {
            const account = getSavedAccount();
            currentAccount = account;
            if (!account?.name) {
                window.location.href = "index.html";
                return;
            }

            const params = new URLSearchParams();
            if (account.account_id) {
                params.set("account_id", account.account_id);
            } else {
                params.set("user", account.name);
            }
            const response = await fetch(`${API_BASE}/user-history?${params.toString()}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || "Unable to load history.");
            }

            document.getElementById("profileName").innerText = account.name;
            const localReviews = getLocalReviews().filter((review) => {
                if (account.account_id && review.account_id) {
                    return String(review.account_id) === String(account.account_id);
                }
                return String(review.user_name || "").trim().toLowerCase() === account.name.toLowerCase();
            });
            const serverReviews = Array.isArray(data.reviewsWritten) ? data.reviewsWritten : [];
            const seenReviewKeys = new Set();
            const mergedReviews = [...serverReviews, ...localReviews].filter((review) => {
                const key = getReviewIdentityKey(review);

                if (seenReviewKeys.has(key)) {
                    return false;
                }

                seenReviewKeys.add(key);
                return true;
            });

            availableRemedies = Array.isArray(data.previousRemedies) ? data.previousRemedies : [];

            document.getElementById("profileReviewCount").innerText = `${mergedReviews.length} reviews written`;
            renderTags("pastSymptoms", data.pastSymptoms || [], "No symptoms recorded yet.");
            renderTags("previousRemedies", data.previousRemedies || [], "No remedies recorded yet.");

            const severityHistory = document.getElementById("severityHistory");
            severityHistory.innerHTML = "";
            const severityRows = Array.isArray(data.symptomSeverity) ? data.symptomSeverity : [];
            if (!severityRows.length) {
                severityHistory.innerHTML = '<p class="text-xs text-slate-400">No symptom severity history yet.</p>';
            } else {
                severityRows.forEach((row) => {
                    const block = document.createElement("div");
                    block.className = "bg-slate-50 rounded-2xl p-4";
                    block.innerHTML = `<p class="text-sm font-semibold text-slate-800">${escapeHtml(row.symptom_name)}</p><p class="text-xs text-slate-500 mt-1">Severity: ${escapeHtml(row.severity_level)}</p><p class="text-[10px] text-slate-400 uppercase tracking-wide mt-2">${escapeHtml(row.created_at || "")}</p>`;
                    severityHistory.appendChild(block);
                });
            }

            const patientHistory = document.getElementById("patientHistory");
            patientHistory.innerHTML = "";
            const patientRows = Array.isArray(data.patientHistory) ? data.patientHistory : [];
            if (!patientRows.length) {
                patientHistory.innerHTML = '<p class="text-xs text-slate-400">No patient forms submitted yet.</p>';
            } else {
                patientRows.forEach((row) => {
                    const block = document.createElement("div");
                    block.className = "bg-slate-50 rounded-2xl p-4";
                    block.innerHTML = `<p class="text-sm font-semibold text-slate-800">${escapeHtml(row.name || "")}</p><p class="text-xs text-slate-500 mt-1">Age: ${escapeHtml(row.age || "")} | DOB: ${escapeHtml(row.dob || "")}</p><p class="text-xs text-slate-500 mt-2">${escapeHtml(row.symptoms || "")}</p><p class="text-[10px] text-slate-400 uppercase tracking-wide mt-2">${escapeHtml(row.duration || "General case")}</p>`;
                    patientHistory.appendChild(block);
                });
            }

            const reviewsWritten = document.getElementById("reviewsWritten");
            reviewsWritten.innerHTML = "";
            if (!mergedReviews.length) {
                reviewsWritten.innerHTML = '<p class="text-xs text-slate-400">No reviews written yet.</p>';
                return;
            }

            mergedReviews.forEach((review) => {
                const card = document.createElement("div");
                card.className = "bg-slate-50 rounded-2xl p-4";
                card.innerHTML = `
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase tracking-wide">${escapeHtml(review.remedy)}</span>
                        <span class="text-[10px] font-bold ${review.moderation_status === "rejected" ? "text-red-600 bg-red-50" : "text-green-700 bg-green-50"} px-2 py-1 rounded-full uppercase tracking-wide">${escapeHtml(review.moderation_status || "approved")}</span>
                    </div>
                    <p class="text-sm text-slate-700 mb-2">"${escapeHtml(review.comment)}"</p>
                    <p class="text-xs text-slate-500">Rating: ${escapeHtml(review.rating || "N/A")} | Useful: ${escapeHtml(review.useful_count || 0)} | Concerns: ${escapeHtml(review.concern_count || 0)}</p>
                    <div class="mt-4 flex items-center gap-2">
                        <button type="button" class="edit-review-btn px-3 py-2 bg-white border border-slate-200 text-slate-700 text-xs font-bold rounded-xl">Edit</button>
                        <button type="button" class="delete-review-btn px-3 py-2 bg-red-50 border border-red-100 text-red-600 text-xs font-bold rounded-xl">Delete</button>
                    </div>
                `;
                card.querySelector(".edit-review-btn").addEventListener("click", () => editReview(review));
                card.querySelector(".delete-review-btn").addEventListener("click", () => deleteReview(review));
                reviewsWritten.appendChild(card);
            });
        }

        function logout() {
            localStorage.removeItem("healthAppAccount");
            localStorage.removeItem("healthAppPatient");
            window.location.href = "index.html";
        }

        window.onload = async () => {
            document.getElementById("backBtn").addEventListener("click", () => {
                window.location.href = "hm3.html";
            });
            document.getElementById("logoutBtn").addEventListener("click", logout);
            document.getElementById("addReviewBtn").addEventListener("click", () => {
                const form = document.getElementById("quickReviewForm");
                form.classList.toggle("hidden");
                if (!form.classList.contains("hidden") && availableRemedies.length && !document.getElementById("newReviewRemedy").value) {
                    document.getElementById("newReviewRemedy").value = availableRemedies[0];
                }
            });
            document.getElementById("submitQuickReviewBtn").addEventListener("click", addAnotherReview);
            try {
                await loadHistory();
            } catch (error) {
                document.getElementById("reviewsWritten").innerHTML = `<p class="text-sm text-red-600">${escapeHtml(error.message || "Unable to load history.")}</p>`;
            }
        };
    </script>
</body>
</html>
