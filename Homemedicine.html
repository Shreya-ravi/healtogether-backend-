<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healtogether - Health Check Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#d1dce8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .input-field {
            transition: all 0.2s ease-in-out;
            border: 1.5px solid #e2e8f0;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .symptom-pill {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .symptom-checkbox:checked + .symptom-label {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
        }

        .hidden-toast {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="successToast" class="fixed top-6 right-6 bg-white border-l-4 border-green-500 p-4 rounded-lg shadow-xl hidden-toast z-50">
        <div class="flex items-center">
            <svg class="w-6 h-6 text-green-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <p class="text-gray-700 font-medium">Form submitted successfully!</p>
        </div>
    </div>

    <div id="accountBadge" class="fixed top-6 right-6 z-40 hidden">
        <div class="glass-card rounded-2xl px-4 py-3 flex items-center gap-3">
            <div id="accountInitial" class="w-9 h-9 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm font-bold">A</div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Account</p>
                <p id="accountName" class="text-sm font-semibold text-slate-700">Guest</p>
            </div>
            <button id="logoutBtn" type="button" class="ml-2 text-[10px] font-bold text-slate-500 hover:text-red-500 uppercase tracking-widest">Logout</button>
        </div>
    </div>

    <div class="glass-card w-full max-w-2xl rounded-3xl p-8 md:p-12 my-8">
        <div class="text-center mb-10">
            <div class="inline-block mb-4">
                <svg width="140" height="120" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="mx-auto">
                    <path d="M70 15C60 15 50 20 45 30C40 40 42 60 55 75L40 100M70 15C80 15 90 20 95 30C100 40 98 60 85 75L100 100" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M60 25C55 25 52 30 52 35" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M58 35C53 35 50 40 50 45" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M58 45C53 45 50 50 50 55" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M60 55C55 55 52 60 52 65" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M80 25C85 25 88 30 88 35" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M82 35C87 35 90 40 90 45" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M82 45C87 45 90 50 90 55" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M80 55C85 55 88 60 88 65" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M10 50L45 80L35 110L5 95Z" fill="none" stroke="#78350f" stroke-width="2.5"/>
                    <path d="M130 50L95 80L105 110L135 95Z" fill="none" stroke="#78350f" stroke-width="2.5"/>
                    <circle cx="115" cy="90" r="4" fill="#78350f"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-slate-800 tracking-tight">HEAL TOGETHER</h1>
            <p class="text-slate-500 mt-2">Comprehensive Patient Health Check</p>
            <div id="todayDateDisplay" class="text-xs font-medium text-slate-400 mt-2 uppercase tracking-widest"></div>
        </div>

        <form id="healthForm" class="space-y-8">
            <input type="hidden" id="submissionDate" name="submissionDate">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                    <input id="fullName" name="name" type="text" required placeholder="Enter your full name" class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800 placeholder:text-slate-400">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Age</label>
                    <select id="ageSelect" required class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800">
                        <option value="" disabled selected>Select Age</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Date of Birth</label>
                    <input id="dobInput" name="dob" type="date" required class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-lg font-medium text-slate-800">Select Your Symptoms</h2>
                    <span class="text-xs font-medium text-blue-500 bg-blue-50 px-2 py-1 rounded-md">General Symptoms</span>
                </div>
                <p class="text-sm text-slate-500 mb-4">Select all symptoms that apply to you.</p>
                
                <div class="flex flex-wrap gap-3">
                    <label class="symptom-pill">
                        <input type="checkbox" name="symptoms" value="fever" class="hidden symptom-checkbox">
                        <span class="symptom-label block px-5 py-2.5 rounded-full border-2 border-slate-100 bg-slate-50 text-slate-600 text-sm font-medium hover:border-slate-200 transition-all">Fever</span>
                    </label>
                    <label class="symptom-pill">
                        <input type="checkbox" name="symptoms" value="cold" class="hidden symptom-checkbox">
                        <span class="symptom-label block px-5 py-2.5 rounded-full border-2 border-slate-100 bg-slate-50 text-slate-600 text-sm font-medium hover:border-slate-200 transition-all">Cold</span>
                    </label>
                    <label class="symptom-pill">
                        <input type="checkbox" name="symptoms" value="cough" class="hidden symptom-checkbox">
                        <span class="symptom-label block px-5 py-2.5 rounded-full border-2 border-slate-100 bg-slate-50 text-slate-600 text-sm font-medium hover:border-slate-200 transition-all">Cough</span>
                    </label>
                    <label class="symptom-pill">
                        <input type="checkbox" name="symptoms" value="headache" class="hidden symptom-checkbox">
                        <span class="symptom-label block px-5 py-2.5 rounded-full border-2 border-slate-100 bg-slate-50 text-slate-600 text-sm font-medium hover:border-slate-200 transition-all">Headache</span>
                    </label>
                    <label class="symptom-pill">
                        <input type="checkbox" name="symptoms" value="stomach-pain" class="hidden symptom-checkbox">
                        <span class="symptom-label block px-5 py-2.5 rounded-full border-2 border-slate-100 bg-slate-50 text-slate-600 text-sm font-medium hover:border-slate-200 transition-all">Stomach Pain</span>
                    </label>
                </div>
                <div class="mt-5">
                    <h3 class="text-sm font-semibold text-slate-700 mb-3">Symptom Severity</h3>
                    <div id="severityControls" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Duration of Suffering</label>
                    <select id="durationSelect" required class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800">
                        <option value="" disabled selected>How long have you felt this?</option>
                        <option value="1-day">Less than 24 hours</option>
                        <option value="2-3-days">2-3 Days</option>
                        <option value="1-week">About a week</option>
                        <option value="2-weeks">2 Weeks or more</option>
                        <option value="chronic">Chronic (Long term)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Other Symptoms or Pain</label>
                    <textarea id="otherSymptoms" placeholder="Describe any other discomfort..." rows="1" class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 text-slate-800 placeholder:text-slate-400 resize-none"></textarea>
                </div>
            </div>

            <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-semibold rounded-2xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 transform hover:-translate-y-0.5 shadow-lg">
                <span class="flex items-center">
                    Submit to Healtogether
                    <svg class="ml-2 w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </span>
            </button>
        </form>

        <div class="mt-8 flex items-center justify-center space-x-2 text-slate-400 text-xs">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
            </svg>
            <span>Verified Secure Healthcare Check</span>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";

        function initializeForm() {
            const now = new Date();
            const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
            document.getElementById("todayDateDisplay").innerText = `Check-in Date: ${now.toLocaleDateString("en-US", options)}`;
            document.getElementById("submissionDate").value = now.toISOString();

            const ageSelect = document.getElementById("ageSelect");
            while (ageSelect.options.length > 1) {
                ageSelect.remove(1);
            }

            for (let i = 0; i <= 100; i++) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.innerHTML = i;
                ageSelect.appendChild(opt);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("successToast");
            toast.querySelector("p").innerText = message;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2500);
        }

        function getSelectedSymptoms() {
            return Array.from(document.querySelectorAll("input[name='symptoms']:checked"))
                .map((checkbox) => checkbox.value);
        }

        function formatSymptomLabel(symptom) {
            return String(symptom || "")
                .split("-")
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                .join(" ");
        }

        function renderSeverityControls() {
            const selectedSymptoms = getSelectedSymptoms();
            const container = document.getElementById("severityControls");
            container.innerHTML = "";

            if (!selectedSymptoms.length) {
                container.innerHTML = '<p class="text-xs text-slate-400">Select symptoms above to rate severity.</p>';
                return;
            }

            selectedSymptoms.forEach((symptom) => {
                const wrapper = document.createElement("label");
                wrapper.className = "bg-white border border-slate-200 rounded-2xl px-4 py-3";
                wrapper.innerHTML = `
                    <span class="block text-sm font-semibold text-slate-700 mb-2">${formatSymptomLabel(symptom)}</span>
                    <select data-symptom="${symptom}" class="input-field w-full px-3 py-2 rounded-xl bg-slate-50 text-slate-800">
                        <option value="Mild">Mild</option>
                        <option value="Moderate" selected>Moderate</option>
                        <option value="Severe">Severe</option>
                    </select>
                `;
                container.appendChild(wrapper);
            });
        }

        function getSymptomSeverity() {
            return Array.from(document.querySelectorAll("#severityControls select"))
                .reduce((acc, select) => {
                    acc[select.dataset.symptom] = select.value;
                    return acc;
                }, {});
        }

        function getSavedAccount() {
            try {
                return JSON.parse(localStorage.getItem("healthAppAccount")) || null;
            } catch (error) {
                return null;
            }
        }

        function getAuthToken() {
            return localStorage.getItem("healthAppAuthToken") || "";
        }

        function getAuthHeaders(extra = {}) {
            const token = getAuthToken();
            return {
                "Content-Type": "application/json",
                ...(token ? { Authorization: `Bearer ${token}` } : {}),
                ...extra
            };
        }

        function updateAccountBadge() {
            const account = getSavedAccount();
            if (!account?.name || !getAuthToken()) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById("accountName").innerText = account.name;
            document.getElementById("accountInitial").innerText = account.name.charAt(0).toUpperCase();
            document.getElementById("accountBadge").classList.remove("hidden");
            document.getElementById("fullName").value = account.name;
            if (account.age !== undefined && account.age !== null && String(account.age).trim() !== "") {
                document.getElementById("ageSelect").value = String(account.age);
            }
            if (account.dob) {
                document.getElementById("dobInput").value = account.dob;
            }
        }

        function logout() {
            localStorage.removeItem("healthAppAccount");
            localStorage.removeItem("healthAppPatient");
            localStorage.removeItem("healthAppAuthToken");
            localStorage.removeItem("healthAppDoctorSession");
            window.location.href = "index.html";
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const symptoms = getSelectedSymptoms();
            if (!symptoms.length) {
                window.alert("Please select at least one symptom.");
                return;
            }

            const payload = {
                account_id: getSavedAccount()?.account_id || null,
                name: document.getElementById("fullName").value.trim(),
                age: document.getElementById("ageSelect").value,
                dob: document.getElementById("dobInput").value,
                phone: getSavedAccount()?.phone || "",
                email: getSavedAccount()?.email || "",
                diseases: symptoms,
                symptomSeverity: getSymptomSeverity(),
                duration: document.getElementById("durationSelect").value,
                notes: document.getElementById("otherSymptoms").value.trim(),
                submissionDate: document.getElementById("submissionDate").value
            };

            try {
                const response = await fetch(`${API_BASE}/add-patient`, {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || "Unable to submit patient details.");
                }

                localStorage.setItem("healthAppPatient", JSON.stringify(payload));
                const account = getSavedAccount();
                if (account?.name) {
                    const updatedAccount = {
                        ...account,
                        age: payload.age,
                        dob: payload.dob
                    };
                    localStorage.setItem("healthAppAccount", JSON.stringify(updatedAccount));

                    try {
                        const savedAccounts = JSON.parse(localStorage.getItem("healthAppAccounts")) || [];
                        const updatedAccounts = savedAccounts.map((item) =>
                            String(item.account_id || "").trim() === String(updatedAccount.account_id || "").trim()
                                ? { ...item, age: payload.age, dob: payload.dob }
                                : item
                        );
                        localStorage.setItem("healthAppAccounts", JSON.stringify(updatedAccounts));
                    } catch (error) {
                        // Keep the current account updated even if the remembered list cannot be parsed.
                    }
                }
                showToast("Patient details submitted successfully!");

                setTimeout(() => {
                    window.location.href = "hm3.html";
                }, 500);
            } catch (error) {
                window.alert(error.message || "Something went wrong while submitting the form.");
            }
        }

        window.onload = () => {
            initializeForm();
            updateAccountBadge();
            document.getElementById("logoutBtn").addEventListener("click", logout);
            document.getElementById("healthForm").addEventListener("submit", handleSubmit);
            document.querySelectorAll("input[name='symptoms']").forEach((checkbox) => {
                checkbox.addEventListener("change", renderSeverityControls);
            });
            renderSeverityControls();
        };
    </script>
</body>
</html>
